{% extends 'base.html' %}

{% block title %}Удалить «{{ room.title }}»{% endblock %}

{% block content %}
<div class="card shadow-sm p-4 bg-white" style="max-width:520px">
    <h1 class="h4">Удалить переговорную</h1>
    <p>Вы уверены, что хотите удалить «<strong>{{ room.title }}</strong>»? Все связанные бронирования также будут удалены.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'manage_rooms' %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
