<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сервис бронирования переговорных коворкингов</title>
</head>
<body>
    <nav>
        <a href="/">Переговорные</a> |
        <a href="/profile/">Профиль</a>
    </nav>

    <h1>Список переговорных</h1>

    {% if rooms %}
        <ul>
            {% for room in rooms %}
                <li>
                    <strong>{{ room.name }}</strong> —
                    вместимость: {{ room.capacity }}<br>
                    {{ room.description }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Пока переговорных нет.</p>
    {% endif %}
</body>
</html>
