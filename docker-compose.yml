services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "docker-secret-key"
      ALLOWED_HOSTS: "*"
      PORT: "8000"
      DB_ENGINE: "postgres"
      DB_NAME: "coworking_db"
      DB_USER: "coworking_user"
      DB_PASSWORD: "coworking_password"
      DB_HOST: "db"
      DB_PORT: "5432"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: "coworking_db"
      POSTGRES_USER: "coworking_user"
      POSTGRES_PASSWORD: "coworking_password"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: